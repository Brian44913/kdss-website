<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="dfBluePurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="dfCyanGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <marker id="dfArrowRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#3b82f6" stroke-width="1"/>
    </marker>
    <marker id="dfArrowDown" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#8b5cf6" stroke-width="1"/>
    </marker>
    <marker id="dfArrowLeft" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#06b6d4" stroke-width="1"/>
    </marker>
    <marker id="dfArrowUp" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#22c55e" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc" rx="8"/>

  <!-- ==================== WRITE PATH (LEFT) ==================== -->
  <text x="200" y="30" font-family="'Inter', sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle" font-weight="700" letter-spacing="1">WRITE PATH</text>
  <line x1="120" y1="38" x2="280" y2="38" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>

  <!-- Step 1: Client (Write) -->
  <rect x="120" y="55" width="160" height="42" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="81" font-family="'Inter', monospace" font-size="12" fill="#3b82f6" text-anchor="middle" font-weight="600">Client Upload</text>

  <!-- Arrow down -->
  <line x1="200" y1="97" x2="200" y2="125" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#dfArrowRight)" opacity="0.7"/>

  <!-- Step 2: EC Encode -->
  <rect x="120" y="127" width="160" height="42" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="200" y="153" font-family="'Inter', monospace" font-size="12" fill="#8b5cf6" text-anchor="middle" font-weight="600">EC Encode</text>
  <!-- Small EC matrix icon -->
  <g transform="translate(138, 139)" opacity="0.5">
    <rect x="0" y="0" width="4" height="4" fill="#8b5cf6"/>
    <rect x="6" y="0" width="4" height="4" fill="#8b5cf6"/>
    <rect x="0" y="6" width="4" height="4" fill="#8b5cf6"/>
    <rect x="6" y="6" width="4" height="4" fill="#8b5cf6" opacity="0.4"/>
  </g>

  <!-- Arrow down -->
  <line x1="200" y1="169" x2="200" y2="197" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#dfArrowDown)" opacity="0.7"/>

  <!-- Step 3: Split into Shards -->
  <rect x="120" y="199" width="160" height="42" rx="8" fill="#ffffff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="200" y="225" font-family="'Inter', monospace" font-size="12" fill="#06b6d4" text-anchor="middle" font-weight="600">Split into Shards</text>

  <!-- Arrow down splitting into 3 -->
  <line x1="160" y1="241" x2="100" y2="285" stroke="#06b6d4" stroke-width="1" marker-end="url(#dfArrowLeft)" opacity="0.6"/>
  <line x1="200" y1="241" x2="200" y2="285" stroke="#06b6d4" stroke-width="1" marker-end="url(#dfArrowLeft)" opacity="0.6"/>
  <line x1="240" y1="241" x2="300" y2="285" stroke="#06b6d4" stroke-width="1" marker-end="url(#dfArrowLeft)" opacity="0.6"/>

  <!-- Step 4: Disks -->
  <g transform="translate(70, 290)">
    <!-- Disk 1 -->
    <ellipse cx="30" cy="8" rx="22" ry="8" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <rect x="8" y="8" width="44" height="24" fill="#ffffff" stroke="#22c55e" stroke-width="1.2"/>
    <ellipse cx="30" cy="32" rx="22" ry="8" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <text x="30" y="24" font-family="'JetBrains Mono', monospace" font-size="8" fill="#22c55e" text-anchor="middle" opacity="0.7">Disk 1</text>
  </g>
  <g transform="translate(170, 290)">
    <!-- Disk 2 -->
    <ellipse cx="30" cy="8" rx="22" ry="8" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <rect x="8" y="8" width="44" height="24" fill="#ffffff" stroke="#22c55e" stroke-width="1.2"/>
    <ellipse cx="30" cy="32" rx="22" ry="8" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <text x="30" y="24" font-family="'JetBrains Mono', monospace" font-size="8" fill="#22c55e" text-anchor="middle" opacity="0.7">Disk 2</text>
  </g>
  <g transform="translate(270, 290)">
    <!-- Disk 3 -->
    <ellipse cx="30" cy="8" rx="22" ry="8" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <rect x="8" y="8" width="44" height="24" fill="#ffffff" stroke="#22c55e" stroke-width="1.2"/>
    <ellipse cx="30" cy="32" rx="22" ry="8" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <text x="30" y="24" font-family="'JetBrains Mono', monospace" font-size="8" fill="#22c55e" text-anchor="middle" opacity="0.7">Disk 3</text>
  </g>

  <!-- Shard labels -->
  <text x="200" y="375" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Data + Parity Shards</text>

  <!-- ==================== DIVIDER ==================== -->
  <line x1="400" y1="50" x2="400" y2="380" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ==================== READ PATH (RIGHT) ==================== -->
  <text x="600" y="30" font-family="'Inter', sans-serif" font-size="14" fill="#22c55e" text-anchor="middle" font-weight="700" letter-spacing="1">READ PATH</text>
  <line x1="520" y1="38" x2="680" y2="38" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>

  <!-- Step 1: Disks (Read) -->
  <g transform="translate(470, 55)">
    <ellipse cx="30" cy="8" rx="22" ry="8" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <rect x="8" y="8" width="44" height="24" fill="#ffffff" stroke="#22c55e" stroke-width="1.2"/>
    <ellipse cx="30" cy="32" rx="22" ry="8" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <text x="30" y="24" font-family="'JetBrains Mono', monospace" font-size="8" fill="#22c55e" text-anchor="middle" opacity="0.7">Disk 1</text>
  </g>
  <g transform="translate(570, 55)">
    <ellipse cx="30" cy="8" rx="22" ry="8" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <rect x="8" y="8" width="44" height="24" fill="#ffffff" stroke="#22c55e" stroke-width="1.2"/>
    <ellipse cx="30" cy="32" rx="22" ry="8" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <text x="30" y="24" font-family="'JetBrains Mono', monospace" font-size="8" fill="#22c55e" text-anchor="middle" opacity="0.7">Disk 2</text>
  </g>
  <g transform="translate(670, 55)">
    <ellipse cx="30" cy="8" rx="22" ry="8" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <rect x="8" y="8" width="44" height="24" fill="#ffffff" stroke="#22c55e" stroke-width="1.2"/>
    <ellipse cx="30" cy="32" rx="22" ry="8" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <text x="30" y="24" font-family="'JetBrains Mono', monospace" font-size="8" fill="#22c55e" text-anchor="middle" opacity="0.7">Disk 3</text>
  </g>

  <!-- Arrows converging up from disks -->
  <line x1="500" y1="100" x2="560" y2="140" stroke="#22c55e" stroke-width="1" marker-end="url(#dfArrowUp)" opacity="0.6"/>
  <line x1="600" y1="100" x2="600" y2="140" stroke="#22c55e" stroke-width="1" marker-end="url(#dfArrowUp)" opacity="0.6"/>
  <line x1="700" y1="100" x2="640" y2="140" stroke="#22c55e" stroke-width="1" marker-end="url(#dfArrowUp)" opacity="0.6"/>

  <!-- Step 2: EC Decode -->
  <rect x="520" y="145" width="160" height="42" rx="8" fill="#ffffff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="600" y="171" font-family="'Inter', monospace" font-size="12" fill="#06b6d4" text-anchor="middle" font-weight="600">EC Decode</text>

  <!-- Arrow down -->
  <line x1="600" y1="187" x2="600" y2="215" stroke="#06b6d4" stroke-width="1.2" marker-end="url(#dfArrowLeft)" opacity="0.7"/>

  <!-- Step 3: Assemble -->
  <rect x="520" y="219" width="160" height="42" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="245" font-family="'Inter', monospace" font-size="12" fill="#8b5cf6" text-anchor="middle" font-weight="600">Assemble Data</text>

  <!-- Arrow down -->
  <line x1="600" y1="261" x2="600" y2="289" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#dfArrowDown)" opacity="0.7"/>

  <!-- Step 4: Client (Read) -->
  <rect x="520" y="293" width="160" height="42" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="319" font-family="'Inter', monospace" font-size="12" fill="#3b82f6" text-anchor="middle" font-weight="600">Client Download</text>

  <!-- Read path shard label -->
  <text x="600" y="375" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Tolerates N-K shard failures</text>

  <!-- ==================== FLOW DIRECTION INDICATORS ==================== -->
  <!-- Write side big arrow -->
  <g transform="translate(50, 180)" opacity="0.15">
    <path d="M0,0 L12,0 L12,-20 L24,0 L12,20 L12,0" fill="#3b82f6" transform="rotate(90, 12, 0)"/>
  </g>
  <!-- Read side big arrow -->
  <g transform="translate(750, 200)" opacity="0.15">
    <path d="M0,0 L12,0 L12,-20 L24,0 L12,20 L12,0" fill="#22c55e" transform="rotate(-90, 12, 0)"/>
  </g>
</svg>