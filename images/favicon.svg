<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <g transform="translate(16, 16)">
    <!-- Main hexagon -->
    <polygon points="0,-14 12.1,-7 12.1,7 0,14 -12.1,7 -12.1,-7" fill="none" stroke="url(#favGrad)" stroke-width="2"/>
    <!-- Center node -->
    <circle cx="0" cy="0" r="2.5" fill="url(#favGrad)"/>
    <!-- Distributed nodes -->
    <circle cx="0" cy="-8" r="2" fill="#3b82f6"/>
    <circle cx="6.9" cy="4" r="2" fill="#8b5cf6"/>
    <circle cx="-6.9" cy="4" r="2" fill="#06b6d4"/>
    <!-- Connection lines from center to nodes -->
    <line x1="0" y1="0" x2="0" y2="-8" stroke="#3b82f6" stroke-width="1.2" opacity="0.8"/>
    <line x1="0" y1="0" x2="6.9" y2="4" stroke="#8b5cf6" stroke-width="1.2" opacity="0.8"/>
    <line x1="0" y1="0" x2="-6.9" y2="4" stroke="#06b6d4" stroke-width="1.2" opacity="0.8"/>
    <!-- Connection lines between outer nodes -->
    <line x1="0" y1="-8" x2="6.9" y2="4" stroke="#6d6ff6" stroke-width="0.8" opacity="0.4"/>
    <line x1="6.9" y1="4" x2="-6.9" y2="4" stroke="#49a0e5" stroke-width="0.8" opacity="0.4"/>
    <line x1="-6.9" y1="4" x2="0" y2="-8" stroke="#20a4ea" stroke-width="0.8" opacity="0.4"/>
  </g>
</svg>