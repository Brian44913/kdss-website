<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Web console: Monitor/dashboard -->
  <!-- Monitor frame -->
  <rect x="2" y="3" width="20" height="14" rx="2"/>
  <!-- Screen divider (dashboard layout) -->
  <line x1="10" y1="3" x2="10" y2="17" opacity="0.3"/>
  <line x1="2" y1="10" x2="10" y2="10" opacity="0.3"/>
  <!-- Dashboard elements -->
  <!-- Bar chart on left top -->
  <rect x="4" y="7" width="1.5" height="2" fill="currentColor" opacity="0.5"/>
  <rect x="6.5" y="5.5" width="1.5" height="3.5" fill="currentColor" opacity="0.5"/>
  <!-- Dots on left bottom -->
  <circle cx="5" cy="13" r="0.8" fill="currentColor" opacity="0.4"/>
  <circle cx="8" cy="13" r="0.8" fill="currentColor" opacity="0.4"/>
  <!-- Line on right side -->
  <polyline points="12,12 14,9 17,11 20,7" opacity="0.5"/>
  <!-- Stand -->
  <line x1="12" y1="17" x2="12" y2="20"/>
  <line x1="8" y1="20" x2="16" y2="20"/>
</svg>